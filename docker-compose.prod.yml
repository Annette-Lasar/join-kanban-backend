services:
  db:
    restart: always
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    entrypoint: ["/app/backend.entrypoint.prod.sh"]
    volumes:
      - /srv/join/static:/app/static
    restart: always
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.26
    container_name: join_nginx
    restart: always
    logging: 
      options: 
        max-size: "10m"
        max-file: "3"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /srv/join/static:/srv/join/static
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      - web

  certbot:
    image: certbot/certbot
    container_name: join_certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: ""
    command:
      [
        "certbot",
        "certonly",
        "--webroot",
        "-w",
        "/var/www/certbot",
        "-d",
        "api.join.annette-lasar.de",
        "--email",
        "a_lasar@web.de",
        "--agree-tos",
        "--no-eff-email",
      ]
    depends_on:
      - nginx

  certbot-renew:
    image: certbot/certbot
    container_name: join_certbot_renew
    restart: always
    entrypoint: ""
    command: >
      sh -c "while :; do
      certbot renew --quiet --webroot -w /var/www/certbot;
      sleep 12h;
      done"
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      - nginx
